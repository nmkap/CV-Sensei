<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Sensei — Refined Logo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F2F0EC;
    font-family: 'DM Sans', sans-serif;
    padding: 64px 48px;
    color: #222831;
  }

  .page-header {
    max-width: 900px;
    margin: 0 auto 56px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid #d4d0ca;
    padding-bottom: 24px;
  }
  .page-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    color: #222831;
  }
  .page-header p {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6B6560;
  }

  .section-label {
    max-width: 900px;
    margin: 0 auto 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .section-label span {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #6B6560;
    white-space: nowrap;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #d4d0ca;
  }

  .grid {
    max-width: 900px;
    margin: 0 auto 56px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .card {
    background: #fff;
    border-radius: 4px;
    padding: 44px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 12px rgba(34,40,49,0.05);
  }
  .card.dark-card {
    background: #222831;
  }
  .card-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6B6560;
    align-self: flex-start;
    margin-bottom: 8px;
  }

  /* Final section */
  .final-grid {
    max-width: 900px;
    margin: 0 auto 56px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
  }

  .size-card {
    background: #222831;
    border-radius: 4px;
    padding: 36px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    box-shadow: 0 1px 12px rgba(34,40,49,0.08);
  }
  .size-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6B6560;
  }

  .footer-note {
    max-width: 900px;
    margin: 0 auto;
    font-size: 11px;
    color: #6B6560;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: right;
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>CV Sensei — Logo Refinement</h1>
  <p>Concept 02 · Final Direction</p>
</div>

<!-- LIGHT + DARK FULL LOCKUP -->
<div class="section-label"><span>Full lockup</span></div>
<div class="grid">

  <!-- LIGHT -->
  <div class="card">
    <div class="card-label">On light</div>
    <svg width="240" height="96" viewBox="0 0 240 96" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Document body: orange stroke -->
      <rect x="8" y="6" width="52" height="68" rx="4" fill="#FDF4EC" stroke="#B55400" stroke-width="2.5"/>
      <!-- Folded corner fill -->
      <path d="M44 6 L60 22 L44 22 Z" fill="#E07A15" opacity="0.18"/>
      <!-- Folded corner lines: orange -->
      <line x1="44" y1="6" x2="44" y2="22" stroke="#B55400" stroke-width="2.5"/>
      <line x1="44" y1="22" x2="60" y2="22" stroke="#B55400" stroke-width="2.5"/>
      <!-- Content lines: warm orange tones -->
      <line x1="17" y1="36" x2="52" y2="36" stroke="#E07A15" stroke-width="2" stroke-linecap="round"/>
      <line x1="17" y1="46" x2="52" y2="46" stroke="#E07A15" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <line x1="17" y1="56" x2="38" y2="56" stroke="#E07A15" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
      <!-- Spark circle: sits at corner overlap -->
      <circle cx="60" cy="68" r="12" fill="#E07A15"/>
      <circle cx="60" cy="68" r="12" fill="url(#spark-gradient)"/>
      <!-- Plus sign: proportionate, not oversized -->
      <line x1="60" y1="62" x2="60" y2="74" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="54" y1="68" x2="66" y2="68" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
      <defs>
        <radialGradient id="spark-gradient" cx="35%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#F5A623"/>
          <stop offset="100%" stop-color="#B55400"/>
        </radialGradient>
      </defs>
      <!-- Wordmark -->
      <text x="84" y="42" font-family="'DM Sans', sans-serif" font-weight="600" font-size="20" fill="#222831" letter-spacing="0.3">CV Sensei</text>
      <text x="85" y="60" font-family="'DM Sans', sans-serif" font-weight="300" font-size="10.5" fill="#B55400" letter-spacing="2.8">AI RÉSUMÉ BUILDER</text>
    </svg>
  </div>

  <!-- DARK -->
  <div class="card dark-card">
    <div class="card-label">On dark</div>
    <svg width="240" height="96" viewBox="0 0 240 96" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="6" width="52" height="68" rx="4" fill="#2e3642" stroke="#E07A15" stroke-width="2.5"/>
      <path d="M44 6 L60 22 L44 22 Z" fill="#E07A15" opacity="0.2"/>
      <line x1="44" y1="6" x2="44" y2="22" stroke="#E07A15" stroke-width="2.5"/>
      <line x1="44" y1="22" x2="60" y2="22" stroke="#E07A15" stroke-width="2.5"/>
      <line x1="17" y1="36" x2="52" y2="36" stroke="#E07A15" stroke-width="2" stroke-linecap="round"/>
      <line x1="17" y1="46" x2="52" y2="46" stroke="#E07A15" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
      <line x1="17" y1="56" x2="38" y2="56" stroke="#E07A15" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
      <circle cx="60" cy="68" r="12" fill="#E07A15"/>
      <circle cx="60" cy="68" r="12" fill="url(#spark-gradient-dark)"/>
      <line x1="60" y1="62" x2="60" y2="74" stroke="#222831" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="54" y1="68" x2="66" y2="68" stroke="#222831" stroke-width="2.2" stroke-linecap="round"/>
      <defs>
        <radialGradient id="spark-gradient-dark" cx="35%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#F5A623"/>
          <stop offset="100%" stop-color="#B55400"/>
        </radialGradient>
      </defs>
      <text x="84" y="42" font-family="'DM Sans', sans-serif" font-weight="600" font-size="20" fill="#F2F0EC" letter-spacing="0.3">CV Sensei</text>
      <text x="85" y="60" font-family="'DM Sans', sans-serif" font-weight="300" font-size="10.5" fill="#E07A15" letter-spacing="2.8">AI RÉSUMÉ BUILDER</text>
    </svg>
  </div>

</div>

<!-- ICON ONLY AT SCALE -->
<div class="section-label"><span>Icon mark at scale</span></div>
<div class="final-grid">

  <!-- Large -->
  <div class="size-card">
    <div class="size-label">Large</div>
    <svg width="80" height="96" viewBox="0 0 68 84" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="52" height="68" rx="4" fill="#2e3642" stroke="#E07A15" stroke-width="2.5"/>
      <path d="M38 2 L54 18 L38 18 Z" fill="#E07A15" opacity="0.2"/>
      <line x1="38" y1="2" x2="38" y2="18" stroke="#E07A15" stroke-width="2.5"/>
      <line x1="38" y1="18" x2="54" y2="18" stroke="#E07A15" stroke-width="2.5"/>
      <line x1="11" y1="32" x2="46" y2="32" stroke="#E07A15" stroke-width="2" stroke-linecap="round"/>
      <line x1="11" y1="42" x2="46" y2="42" stroke="#E07A15" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
      <line x1="11" y1="52" x2="32" y2="52" stroke="#E07A15" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
      <circle cx="54" cy="66" r="14" fill="url(#sg1)"/>
      <line x1="54" y1="59" x2="54" y2="73" stroke="#222831" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="47" y1="66" x2="61" y2="66" stroke="#222831" stroke-width="2.4" stroke-linecap="round"/>
      <defs><radialGradient id="sg1" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#F5A623"/><stop offset="100%" stop-color="#B55400"/></radialGradient></defs>
    </svg>
  </div>

  <!-- Medium -->
  <div class="size-card">
    <div class="size-label">Medium</div>
    <svg width="52" height="62" viewBox="0 0 68 84" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="52" height="68" rx="4" fill="#2e3642" stroke="#E07A15" stroke-width="2.5"/>
      <path d="M38 2 L54 18 L38 18 Z" fill="#E07A15" opacity="0.2"/>
      <line x1="38" y1="2" x2="38" y2="18" stroke="#E07A15" stroke-width="2.5"/>
      <line x1="38" y1="18" x2="54" y2="18" stroke="#E07A15" stroke-width="2.5"/>
      <line x1="11" y1="32" x2="46" y2="32" stroke="#E07A15" stroke-width="2" stroke-linecap="round"/>
      <line x1="11" y1="42" x2="46" y2="42" stroke="#E07A15" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
      <line x1="11" y1="52" x2="32" y2="52" stroke="#E07A15" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
      <circle cx="54" cy="66" r="14" fill="url(#sg2)"/>
      <line x1="54" y1="59" x2="54" y2="73" stroke="#222831" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="47" y1="66" x2="61" y2="66" stroke="#222831" stroke-width="2.4" stroke-linecap="round"/>
      <defs><radialGradient id="sg2" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#F5A623"/><stop offset="100%" stop-color="#B55400"/></radialGradient></defs>
    </svg>
  </div>

  <!-- Small -->
  <div class="size-card">
    <div class="size-label">Small</div>
    <svg width="32" height="38" viewBox="0 0 68 84" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="52" height="68" rx="4" fill="#2e3642" stroke="#E07A15" stroke-width="2.5"/>
      <path d="M38 2 L54 18 L38 18 Z" fill="#E07A15" opacity="0.2"/>
      <line x1="38" y1="2" x2="38" y2="18" stroke="#E07A15" stroke-width="2.5"/>
      <line x1="38" y1="18" x2="54" y2="18" stroke="#E07A15" stroke-width="2.5"/>
      <line x1="11" y1="32" x2="46" y2="32" stroke="#E07A15" stroke-width="2" stroke-linecap="round"/>
      <line x1="11" y1="42" x2="46" y2="42" stroke="#E07A15" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
      <line x1="11" y1="52" x2="32" y2="52" stroke="#E07A15" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
      <circle cx="54" cy="66" r="14" fill="url(#sg3)"/>
      <line x1="54" y1="59" x2="54" y2="73" stroke="#222831" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="47" y1="66" x2="61" y2="66" stroke="#222831" stroke-width="2.4" stroke-linecap="round"/>
      <defs><radialGradient id="sg3" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#F5A623"/><stop offset="100%" stop-color="#B55400"/></radialGradient></defs>
    </svg>
  </div>

</div>

<div class="footer-note">CV Sensei · Brand Identity · 2026</div>

</body>
</html>
